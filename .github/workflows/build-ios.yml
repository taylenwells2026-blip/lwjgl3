name: Build iOS LWJGL Natives
on: [workflow_dispatch]

jobs:
  build-natives:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java Toolchain Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Apache Ant and Developer Tools
        run: |
          brew install ant
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Compile LWJGL Templates and Core Natives
        run: |
          ant init
          ant compile-templates
          ant compile-native \
            -Dplatform=macos \
            -Darch=arm64 \
            -Dbinding.core=true \
            -Dtarget.mac=true \
            -DCC=clang \
            -DCXX=clang++
          
          # Find all newly generated dylibs dynamically and patch them for iOS
          find bin/ -name "*.dylib" | while read -r file; do
            echo "Patching header for: $file"
            xcrun vtool -arch arm64 -set-build-version ios 14.0 14.0 -replace -output "$file" "$file"
          done

      - name: Package and Upload iOS Dylibs
        uses: actions/upload-artifact@v4
        with:
          name: lwjgl341-ios-arm64-natives
          path: "bin/**/*.dylib"
