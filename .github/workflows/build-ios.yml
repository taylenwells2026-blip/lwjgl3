name: Build iOS LWJGL Natives
on: [workflow_dispatch]

jobs:
  build-natives:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java Toolchain Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Apache Ant and Developer Tools
        run: |
          brew install ant
          # Link Xcode's standard active command line compiler
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Compile LWJGL Templates and Core Natives
        run: |
          # 1. Initialize system directories
          ant init
          
          # 2. Invoke the template generator target
          ant compile-templates
          
          # 3. Explicitly pass compiler mapping flags to Ant for Apple Silicon
          ant compile-native \
            -Dplatform=macos \
            -Darch=arm64 \
            -Dbinding.core=true \
            -Dtarget.mac=true \
            -DCC=clang \
            -DCXX=clang++
          
          # 4. Modify load commands to switch from macOS to iOS platform structural layers
          cd bin/libs/native/macosx/arm64
          for file in *.dylib; do
            xcrun vtool -arch arm64 -set-build-version ios 14.0 14.0 -replace -output "$file" "$file"
          done

      - name: Package and Upload iOS Dylibs
        uses: actions/upload-artifact@v4
        with:
          name: lwjgl341-ios-arm64-natives
          path: "bin/libs/native/macosx/arm64/*.dylib"
