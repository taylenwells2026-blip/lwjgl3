name: Build iOS LWJGL Natives
on: [workflow_dispatch]

jobs:
  build-natives:
    runs-on: macos-14
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java Toolchain Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Apache Ant
        run: brew install ant

      - name: Compile LWJGL Templates and Core Natives
        run: |
          # 1. Download necessary build-time libraries
          ant update-dependencies
          
          # 2. Invoke the missing template target required by LWJGL
          ant compile-templates
          
          # 3. Build the core C binaries
          ant compile-native -Dplatform=macos -Darch=arm64 -Dbinding.core=true
          
          # 4. Modify load commands to switch from macOS to iOS platform
          cd bin/libs/native/macosx/arm64
          for file in *.dylib; do
            xcrun vtool -arch arm64 -set-build-version ios 14.0 14.0 -replace -output "$file" "$file"
          done

      - name: Package and Upload iOS Dylibs
        uses: actions/upload-artifact@v4
        with:
          name: lwjgl341-ios-arm64-natives
          path: "bin/libs/native/macosx/arm64/*.dylib"
